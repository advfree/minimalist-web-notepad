# ============================================================
# Docker Compose 配置模板
# 使用方法：
#   1. 复制 docker-compose.sample.yml 为 docker-compose.yml
#   2. 按需修改下面的配置项（参考右侧注释）
#   3. chmod 777 data（或 mkdir data）
#   4. docker compose up -d
#   5. 访问 http://localhost:8080
# ============================================================

services:
  app:
    build: .
    container_name: minimalist-web-notepad
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/var/www/html/_data
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# ============================================================
# 字段说明
# ============================================================
#
# build:        Dockerfile 路径，. = 当前目录
# container_name: 容器名，唯一标识，不可与其他容器重复
# restart:      重启策略
#               - unless-stopped：开机自启（推荐）
#               - always：始终重启
#               - no：不自动重启
# ports:        "宿主机端口:容器端口"
#               左侧是本机端口，右侧是容器内端口
#               改左侧数字可避开端口冲突，如 "8081:8080"
# volumes:      数据持久化
#               左侧 ./data 是本机目录（自行 mkdir）
#               右侧 /var/www/html/_data 是容器内数据目录（勿改）
# environment:  环境变量，TZ=时区（Asia/Shanghai = 北京时间）
# healthcheck:  健康检查，curl 访问首页确认容器运行正常
#
# ============================================================

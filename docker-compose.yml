services:
  app:
    build: .
    container_name: minimalist-web-notepad2
    restart: unless-stopped
    ports:
      - "18183:8080"
    volumes:
      - ./data:/var/www/_data
      - ./config.yaml:/var/www/config.yaml:ro
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# ============================================================
# 极简笔记 - Docker Compose 配置模板
# 端口: 8080（由外部反向代理提供 HTTPS）
# 数据: ./data 持久化 SQLite 数据库
# ============================================================

services:
  app:
    build: .
    container_name: mininotepad
    restart: unless-stopped
    ports:
      - "8080:8080"          # 宿主机端口，外部通过 8080 访问
    volumes:
      - ./data:/var/www/html/_data    # 持久化存储（SQLite 数据库）
    environment:
      - TZ=Asia/Shanghai              # 时区
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# ============================================================
# 各字段说明：
#
# build:       构建镜像的 Dockerfile 路径，. 表示当前目录
# container_name: 容器名称，唯一标识
# restart:     重启策略，unless-stopped = 机器重启后自动启动
# ports:       "宿主机端口:容器端口"，外部访问 8080，容器内部也是 8080
# volumes:     数据持久化，宿主机 ./data 映射到容器 /var/www/html/_data
#              修改 ./data 权限：chmod 777 data
# environment: 环境变量，TZ 设置时区
# healthcheck: 健康检查，curl 访问首页确认容器正常运行
#
# 使用方法：
#   1. 复制此文件为 docker-compose.yml
#   2. 编辑 config.yaml 修改密码
#   3. chmod 777 data（或 mkdir data 再 chmod）
#   4. docker-compose up -d
#   5. 访问 http://localhost:8080
# ============================================================

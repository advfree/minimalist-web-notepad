services:
  app:
    # 使用 GitHub Container Registry 预构建镜像（无需本地编译）
    image: ghcr.io/advfree/minimalist-web-notepad:latest
    container_name: minimalist-web-notepad
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/var/www/html/_data
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
